{% extends 'base.html' %}
{% block title %}لوحة تينانت{% endblock %}
{% block page_title %}🏢 لوحة تينانت{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="alert alert-info border-0 shadow-sm d-flex justify-content-between align-items-center">
    <div>
      <div class="font-weight-bold">أنت الآن داخل تينانت: {{ g.tenant_slug }}</div>
      <div class="small">هذه لوحة خاصة بالتينانت ضمن المسار /t/{{ g.tenant_slug }}</div>
    </div>
    <div class="d-flex" style="gap:.5rem;">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-sm">لوحة النظام</a>
      <form method="POST" action="{{ url_for('auth.logout') }}" class="m-0">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn btn-outline-secondary btn-sm">خروج</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
