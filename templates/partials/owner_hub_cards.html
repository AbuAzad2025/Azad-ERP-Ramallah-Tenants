{# أقسام بطاقات لوحة المالك — يُمرَّر hub_sections من owner_hubs #}
{% for section in hub_sections %}
<div class="owner-hub-section mb-4">
  <h6 class="owner-hub-section-title text-muted mb-3">
    <i class="fas {{ section.icon }} ms-1"></i> {{ section.title }}
  </h6>
  <div class="row g-3">
    {% for card in section.cards %}
    <div class="col-md-6 col-lg-4">
      <a href="{{ url_for(card.endpoint) }}" class="owner-hub-card card h-100 text-decoration-none border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-start justify-content-between">
            <span class="owner-hub-icon badge badge-{{ card.color|default('secondary') }} p-2">
              <i class="fas {{ card.icon }}"></i>
            </span>
            <i class="fas fa-arrow-left text-muted small"></i>
          </div>
          <h6 class="mt-3 mb-1 text-dark font-weight-bold">{{ card.label }}</h6>
          <p class="small text-muted mb-0">{{ card.desc }}</p>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
{% endfor %}
